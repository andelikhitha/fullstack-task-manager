<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <h1>
            Task Manager
        </h1>

    </header>

    <!-- MAIN CONTAINER -->

    <div class="container">

        <!-- ADD TASK -->

        <div class="task-form">

            <h2>Add New Task</h2>

            <input
            type="text"
            id="title"
            placeholder="Enter Task Title">

            <textarea
            id="description"
            placeholder="Enter Task Description"></textarea>

            <button id="addTaskBtn">

                Add Task

            </button>

        </div>

        <!-- TASK LIST -->

        <div class="task-list">

            <h2>Your Tasks</h2>

            <div id="tasksContainer">

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
